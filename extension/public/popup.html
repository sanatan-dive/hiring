<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hirin</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 320px;
        background: #fff;
        color: #111;
      }
      header {
        padding: 16px 16px 8px;
        border-bottom: 1px solid #f3f4f6;
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      h1 .dot { color: #0ea5e9; }
      main {
        padding: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        font-size: 13px;
      }
      .label { color: #6b7280; }
      .value { color: #111; font-weight: 500; }
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 0;
        background: #000;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 8px;
      }
      button:hover { background: #1f2937; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        background: #fff;
        color: #111;
        border: 1px solid #e5e7eb;
      }
      button.secondary:hover { background: #f9fafb; }
      .empty {
        text-align: center;
        padding: 16px 0;
        font-size: 13px;
        color: #6b7280;
      }
      .empty a { color: #0ea5e9; text-decoration: none; }
      .status {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
      }
      .status.ok { background: #ecfdf5; color: #065f46; }
      .status.err { background: #fef2f2; color: #991b1b; }
    </style>
  </head>
  <body>
    <header>
      <h1>Hirin<span class="dot">.</span></h1>
    </header>
    <main id="main">
      <div class="empty">Loading…</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
